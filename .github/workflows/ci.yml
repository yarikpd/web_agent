name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    name: Build and Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    env:
      BUILD_DIR: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up CMake
        uses: jwlawson/actions-setup-cmake@v2

      - name: Set up Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Meson
        run: python -m pip install meson

      - name: Cache CMake FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.BUILD_DIR }}/_deps
          key: ${{ runner.os }}-fetchcontent-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-fetchcontent-

      - name: Configure CMake
        run: >
          cmake
          -S .
          -B ${{ env.BUILD_DIR }}
          -G Ninja
          -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build ${{ env.BUILD_DIR }} --parallel

      - name: Run tests
        run: ctest --test-dir ${{ env.BUILD_DIR }} --output-on-failure -C Debug

      - name: Upload web_agent artifact (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: web_agent-${{ matrix.os }}
          path: ${{ env.BUILD_DIR }}/web_agent
          if-no-files-found: error

      - name: Upload web_agent artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: web_agent-${{ matrix.os }}
          path: ${{ env.BUILD_DIR }}/web_agent.exe
          if-no-files-found: error
