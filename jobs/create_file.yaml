job:
  name: create_file
  description: Create a file with specified content
  command:
    linux: touch {directory}/{filename}
    windows: type nul > {directory}\{filename}
    macos: touch {directory}/{filename}
  parameters:
    directory:
      description: The directory of new file
      required: true
      type: string
    filename:
      description: File name with extension
      required: true
      type: string
  return:
    description: The list of files in the directory
    type: bool